services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: servicepro
      POSTGRES_USER: servicepro
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicepro -d servicepro"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  app:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "3000:3000"
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://servicepro:${DB_PASSWORD}@db:5432/servicepro
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${APP_URL}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_PUBLIC_URL: ${APP_URL}/storage

  caddy:
    image: caddy:2.8
    restart: always
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
